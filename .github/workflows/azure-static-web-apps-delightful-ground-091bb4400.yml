name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # 1. Setup Node.js (Ensures GitHub uses the correct Node version for your build)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2" # Change this to 18 or whichever version your Angular app requires

      # 2. Run your custom build using npm ci
      - name: Install dependencies and build
        run: |
          npm ci
          npm run generate

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      # 3. Deploy the pre-built application
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_GROUND_091BB4400 }}
          action: "upload"

          ###### Modified Build Configurations ######
          skip_app_build: true # Tells Azure NOT to run its own npm install / build process
          app_location: "dist" # When skipping the build, this MUST point to your compiled output folder
          api_location: ""
          output_location: "" # When skipping the build, this MUST be left empty
          production_branch: "main"
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######
